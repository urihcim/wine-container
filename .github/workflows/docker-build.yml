name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set environment variables
        run: |
          echo "IMAGE=ghcr.io/${{ github.repository_owner }}/wine" >> $GITHUB_ENV
          echo "VERSION=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Set flag
        id: flag
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ||
                "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "with_push=true" >> $GITHUB_OUTPUT
          else
            echo "with_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        if: steps.flag.outputs.with_push == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: ${{ steps.flag.outputs.with_push == 'true' }}
          tags: |
            ${{ format('{0}:latest', env.IMAGE) }}
            ${{ format('{0}:{1}', env.IMAGE, env.VERSION) }}
